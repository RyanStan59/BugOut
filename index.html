<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" />  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  <title>BugOut Login</title>  <link rel="stylesheet" href="css/style.css" /></head><body>  <div class="page-wrap">    <div class="login-container">      <!-- Left side -->      <div class="left-panel">        <div class="logo-circle">          <img src="assets/logo.png" alt="BugOut Logo" />        </div>        <div class="tagline-box">          <span class="green">Report it.</span>          <span class="blue">Track it.</span>          <span class="purple">Fix it.</span>        </div>        <h1>Welcome Page</h1>        <p>Sign in to<br />continue access</p>      </div>      <!-- Right side -->      <div class="right-panel">        <h2>Sign In</h2>        <form id="loginForm">          <label for="email">Email</label>          <input type="email" id="email" name="email" required />          <label for="password">Password</label>          <input type="password" id="password" name="password" required />          <button type="submit">LOGIN</button>        </form>      </div>    </div>  </div>  <script src="js/login.js"></script></body></html>
